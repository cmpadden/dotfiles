repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      - id: stylua-system
  - repo: local
    hooks:
      - id: bash-syntax
        name: bash syntax check
        entry: bash -n
        language: system
        types: [shell]
      - id: shfmt
        name: shfmt
        entry: shfmt -d
        language: system
        types: [shell]
