repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      - id: stylua-system
        args: [--config-path, .stylua.toml]
  - repo: local
    hooks:
      - id: bash-syntax
        name: bash syntax check
        entry: bash -n
        language: system
        types: [shell]
      - id: shfmt
        name: shfmt
        entry: shfmt -d -i 4
        language: system
        types: [shell]
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check
        language: system
        types: [python]
      - id: ty-check
        name: ty check
        entry: uvx ty check
        language: system
        types: [python]
        exclude: ^(python/.ipython/|qutebrowser/|ranger/)
