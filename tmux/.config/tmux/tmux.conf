####################################################################################################
#                                             Options                                              #
####################################################################################################

if-shell -b '[ "$(uname)" = "Darwin" ]' {
    set -g default-shell /opt/homebrew/bin/bash
}

# https://gist.github.com/andersevenrud/015e61af2fd264371032763d4ed965b6
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g focus-events on                # focus events enabled for terminals that support them
set -g history-limit 50000            # Pre-allocates size for all windows, use with caution
set -g mode-keys vi                   # vi bindings in copy mode
set -g mouse off                      # Don't allow mouse events to be bound as key bindings
set -g status-keys vi                 # vi bindings in tmux command prompt
set -s escape-time 0                  # address vim mode switching delay (http://superuser.com/a/252717/65504)
set-option -g display-panes-time 3000 # display pane indicators for 3 seconds
set-option -g renumber-windows on     # Automatic renumbering
set-option -g status off              # Default to hiding the status bar
set-window-option -g mode-keys vi     # Use vim keybindings in copy mode

# Don't rename windows
set-window-option -g automatic-rename off
set-option -g allow-rename off

# automatically rebalance split panes
# set-hook -g after-split-window "select-layout even-horizontal"

####################################################################################################
#                                              Theme                                               #
####################################################################################################

%hidden DARK0=#282828
%hidden DARK1=#787878
%hidden LIGHT0=#ebdbb2
%hidden LIGHT1=#fbf1c7
%hidden PURPLE=#d3869b
%hidden ORANGE=#fe8019
%hidden YELLOW=#fabd2f
%hidden GREEN=#b8bb26
%hidden BLUE=#83a598
%hidden AQUA=#8ec07c
%hidden RED=#fb4934

set-option -g display-panes-active-colour "$LIGHT0"
set-option -g display-panes-colour "$LIGHT0"
set-option -g message-style "fg=$LIGHT0,bg=$DARK0"
set-option -g pane-active-border-style "fg=colour238"
set-option -g pane-border-style "fg=colour238"
set-option -g status-style "fg=$LIGHT0,bg=$DARK0"
set-window-option -g clock-mode-colour "$LIGHT0"
set-window-option -g mode-style "fg=$LIGHT0,bg=$DARK0"
set-window-option -g window-status-bell-style "fg=$LIGHT0,bg=$DARK0"
set-window-option -g window-status-current-style "fg=$PURPLE,bg=$DARK0,bold"
set-window-option -g window-status-style "fg=$DARK1"

set -g status-interval 1
set -g status-left-length 64
set -g status-left "#[bg=$PURPLE,fg=$DARK0] #{window_name} #[default] #{pane_current_path}"
set -g status-right ""
set -g status-justify "right"
set -g status-position "top"
set -g pane-border-status off
set -g pane-border-format '#{pane_current_command} #{pane_current_path}'
set -g window-status-separator " "
set -g window-status-format "#I"
set -g window-status-current-format "#{?window_zoomed_flag,*,}#I"

# if-shell -b '[ "$(uname)" = "Darwin" ]' {
#     set -g status-right "C #{cpu_percentage}% M #{ram_percentage}% %Y-%m-%d %H:%M"
# }

# if-shell -b '[ "$(uname)" = "Linux" ]' {
#     set -g status-right "C #{cpu_percentage} #{cpu_temp} G #{gpu_percentage} #{gpu_temp} M {ram_percentage}%"
# }

####################################################################################################
#                                             Bindings                                             #
####################################################################################################

set -g prefix C-a
bind C-a send-prefix
unbind C-b

# reloading unbind r
bind r source-file ~/.config/tmux/tmux.conf

# pane splitting
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# fzf-powered window selector
bind-key w if-shell 'command -v fzf >/dev/null 2>&1' {
  run-shell ~/.config/tmux/scripts/fzf-choose-tree.sh
} {
  choose-tree -Zw
}

# create `wt` in a named tmux window
bind-key B if-shell 'command -v wt >/dev/null 2>&1' {
  command-prompt -p "window name:" \
    'run-shell "~/.config/tmux/scripts/wt-new-window.sh %% #{pane_current_path}"'
} {
  display-message "Required dependency not installed: `wt`"
}

# ability to create new named sessions
bind S command-prompt -p "session name:" "new-session -s '%%'"

# pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane sizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# reorder windows
bind -r C-h swap-window -t -1 \; prev
bind -r C-l swap-window -t +1 \; next

# Toggle status bar
bind -r Space set-option -g status

bind-key -T copy-mode-vi v send-keys -X begin-selection

# floating popup of notes
bind-key o display-popup \
  -E \
  -x "200%" \
  -y "0" \
  -w "120" \
  -h "80%" \
  -b "rounded" \
  -d "$HOME" \
  "nvim src/notes/work/index.md"

# floating popup of lazygit
bind-key g display-popup \
  -E \
  -w "80%" \
  -h "60%" \
  -d "#{pane_current_path}" \
  "lazygit"

# floating popup ~chatblade~ llm
# bind-key ! display-popup -d "#{pane_current_path}" -E "chatblade -i"
bind-key ! display-popup \
  -E \
  -d "#{pane_current_path}" \
  "llm chat"

# Toggle prefix -- useful when using nested sessions
# Source: https://gist.github.com/samoshkin/06e65f7f1c9b55d3fc7690b59d678734

bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-right "[OFF]"

bind -T off F12 \
  set -u prefix \;\
  set -u key-table  \;\
  set -u status-right

####################################################################################################
#                                             Plugins                                              #
####################################################################################################

# Use Prefix+I to fetch plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-open'

# Enables saving and restoring tmux pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager
run -b '~/.tmux/plugins/tpm/tpm'
